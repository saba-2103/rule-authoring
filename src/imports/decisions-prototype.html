const fmt=(iso)=>iso?new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'—';

const FACT_FIELDS=[

  {label:'ApplicantInfo.annualIncome',value:'ApplicantInfo.annualIncome',dataType:'number'},
  {label:'ApplicantInfo.productCode',value:'ApplicantInfo.productCode',dataType:'string'},
  {label:'ApplicantInfo.dateOfBirth',value:'ApplicantInfo.dateOfBirth',dataType:'date'},
  {label:'ApplicantInfo.eligible',value:'ApplicantInfo.eligible',dataType:'boolean'},
  {label:'ApplicantInfo.premiumRate',value:'ApplicantInfo.premiumRate',dataType:'number'},
  {label:'ApplicantInfo.riskScore',value:'ApplicantInfo.riskScore',dataType:'number'},
  {label:'ApplicantInfo.sumAssured',value:'ApplicantInfo.sumAssured',dataType:'number'},
  {label:'VehicleInfo.make',value:'VehicleInfo.make',dataType:'string'},

  {label:'ClaimInfo.claimCount',value:'ClaimInfo.claimCount',dataType:'number'},

const OPERATORS=[
  {value:'EQUALS',label:'equals',types:['number','string','boolean','date']},
  {value:'NOT_EQUALS',label:'does not equal',types:['number','string','boolean','date']},
  {value:'GREATER_THAN',label:'is greater than',types:['number']},
  {value:'GREATER_THAN_OR_EQUAL',label:'is ≥',types:['number']},
  {value:'LESS_THAN',label:'is less than',types:['number']},
  {value:'LESS_THAN_OR_EQUAL',label:'is ≤',types:['number']},

  {value:'IN',label:'is one of',types:['string','number']},
  {value:'IS_NULL',label:'is null',types:['number','string','boolean','date']},
  {value:'IS_NOT_NULL',label:'is not null',types:['number','string','boolean','date']},

const ACTION_TYPES=[
  {value:'ASSIGN',label:'ASSIGN — Set field value'},
  {value:'COMPUTE',label:'COMPUTE — Evaluate formula'},
  {value:'MULTIPLY',label:'MULTIPLY — Multiply field'},
  {value:'APPLY_PERCENTAGE',label:'APPLY_PERCENTAGE — Apply %'},
  {value:'ADD_MESSAGE',label:'ADD_MESSAGE — Append message'},
  {value:'BRANCH',label:'BRANCH — Conditional action'},
  {value:'LOOKUP',label:'LOOKUP — Fetch from table'},
  {value:'LOG',label:'LOG — Debug log'},

const STATUS_META={

const mkRule=(id,name,category,tags,versions)=>({id,name,category,tags,createdAt:'2025-01-10T08:00:00',createdBy:'alice@insure.com',versions});

const Btn=({children,variant='default',size='default',className='',onClick,disabled,type='button'})=>{
  const base='inline-flex items-center justify-center font-medium rounded-md transition-all focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-1 disabled:opacity-40 disabled:pointer-events-none';
  const v={default:'bg-blue-600 text-white hover:bg-blue-700 shadow-sm',outline:'border border-gray-200 bg-white text-gray-700 hover:bg-gray-50',ghost:'text-gray-600 hover:bg-gray-100 hover:text-gray-800',destructive:'bg-red-600 text-white hover:bg-red-700',secondary:'bg-gray-100 text-gray-700 hover:bg-gray-200'};
  const s={default:'h-8 px-3.5 text-sm gap-2',sm:'h-7 px-2.5 text-xs gap-1.5',lg:'h-9 px-4 text-sm gap-2',icon:'h-8 w-8 p-0 text-sm'};

};

  if(!open)return null;
  return<div className="fixed inset-0 z-50 flex items-start justify-center pt-16 px-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="fixed inset-0 bg-black/25 backdrop-blur-sm" onClick={onClose}/>
    <div className={cn('relative bg-white rounded-xl shadow-2xl w-full fade-in flex flex-col max-h-[80vh]',width)}>
      <div className="flex items-start justify-between p-5 pb-3 shrink-0 border-b border-gray-100">
        <div><h2 className="text-base font-semibold text-gray-900">{title}</h2>
        {subtitle&&<p className="text-sm text-gray-500 mt-0.5">{subtitle}</p>}</div>
        <button onClick={onClose} className="ml-3 p-1.5 rounded-md text-gray-400 hover:text-gray-600 hover:bg-gray-100">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>

    </div>

  return<div className="fixed bottom-5 right-5 z-50 fade-in bg-gray-900 text-white text-sm px-4 py-2.5 rounded-xl shadow-xl flex items-center gap-2.5">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4ADE80" strokeWidth="2.5"><path d="M20 6 9 17l-5-5"/></svg>
    {msg}
  </div>;
};

/* ── CONDITION BUILDER ───────────────────────────── */
const ConditionRow=({cond,onChange,onRemove,index})=>{
  const fieldMeta=FACT_FIELDS.find(f=>f.value===cond.field);
  const dtype=fieldMeta?.dataType||'string';
  const ops=OPERATORS.filter(o=>o.types.includes(dtype));
  const isBetween=cond.operator==='BETWEEN';
  return(
    <div className="flex items-center gap-2 flex-wrap">
      <span className="text-xs text-gray-400 w-5 text-right shrink-0">{index>0?'AND':''}</span>
      <Sel value={cond.field} onChange={e=>onChange({...cond,field:e.target.value,operator:'EQUALS',value:'',secondValue:''})}
        options={[{value:'',label:'Select field…'},...FACT_FIELDS]} className="min-w-[190px]"/>
      <Sel value={cond.operator} onChange={e=>onChange({...cond,operator:e.target.value,secondValue:''})}
        options={ops.map(o=>({value:o.value,label:o.label}))} className="min-w-[140px]"/>
      {!['IS_NULL','IS_NOT_NULL'].includes(cond.operator)&&(
        <Inp value={cond.value} onChange={e=>onChange({...cond,value:e.target.value})} placeholder="value" className="w-24"/>
      )}
      {isBetween&&<>
        <span className="text-xs text-gray-400">and</span>
        <Inp value={cond.secondValue||''} onChange={e=>onChange({...cond,secondValue:e.target.value})} placeholder="end" className="w-24"/>
      </>}
      <Btn size="icon" variant="ghost" onClick={onRemove} className="shrink-0 hover:bg-red-50 hover:text-red-500"><IC.Trash size={12}/></Btn>
    </div>
  );
};

const ActionRow=({action,onChange,onRemove})=>{
  const isAssign=action.type==='ASSIGN';
  const isMsg=action.type==='ADD_MESSAGE';
  const isCompute=action.type==='COMPUTE';
  const isMultiply=action.type==='MULTIPLY';
  const isPct=action.type==='APPLY_PERCENTAGE';
  const isLog=action.type==='LOG';
  return(
    <div className="flex items-start gap-2 flex-wrap">
      <Sel value={action.type} onChange={e=>onChange({...action,type:e.target.value,field:'',value:'',config:{}})}
        options={ACTION_TYPES} className="min-w-[200px]"/>
      {(isAssign||isCompute||isMultiply||isPct)&&
        <Sel value={action.field} onChange={e=>onChange({...action,field:e.target.value})}
          options={[{value:'',label:'Target field…'},...FACT_FIELDS]} className="min-w-[180px]"/>}
      {isAssign&&<Inp value={action.value} onChange={e=>onChange({...action,value:e.target.value})} placeholder="value" className="w-28"/>}
      {isCompute&&<Inp value={action.config?.formula||''} onChange={e=>onChange({...action,config:{formula:e.target.value}})} placeholder="formula" className="w-48"/>}
      {(isMultiply||isPct)&&<Inp value={action.config?.multiplier||action.config?.percentage||''} onChange={e=>onChange({...action,config:isMultiply?{multiplier:e.target.value}:{percentage:e.target.value}})} placeholder={isMultiply?"multiplier":"%"} className="w-24"/>}
      {isMsg&&<Inp value={action.config?.template||''} onChange={e=>onChange({...action,config:{template:e.target.value}})} placeholder="Message template…" className="flex-1 min-w-[240px]"/>}
      {isLog&&<Inp value={action.config?.message||''} onChange={e=>onChange({...action,config:{message:e.target.value}})} placeholder="Log message…" className="flex-1 min-w-[240px]"/>}
      <Btn size="icon" variant="ghost" onClick={onRemove} className="hover:bg-red-50 hover:text-red-500 shrink-0"><IC.Trash size={12}/></Btn>
    </div>
  );
};

const RuleBuilder=({when,then,onChange})=>{
  const updCond=(i,c)=>{const nc=[...when.conditions];nc[i]=c;onChange({when:{...when,conditions:nc},then});};
  const delCond=(i)=>{const nc=when.conditions.filter((_,j)=>j!==i);onChange({when:{...when,conditions:nc},then});};
  const addCond=()=>onChange({when:{...when,conditions:[...when.conditions,{id:uid(),field:'',operator:'EQUALS',value:'',secondValue:''}]},then});
  const updAct=(i,a)=>{const na=[...then];na[i]=a;onChange({when,then:na});};
  const delAct=(i)=>onChange({when,then:then.filter((_,j)=>j!==i)});
  const addAct=()=>onChange({when,then:[...then,{id:uid(),type:'ASSIGN',field:'',value:'',config:{}}]});

  return(
    <div className="flex flex-col gap-5">
      {/* WHEN */}
      <div className="border border-gray-200 rounded-lg overflow-hidden">
        <div className="bg-amber-50 border-b border-amber-100 px-4 py-2.5 flex items-center gap-3">
          <span className="text-xs font-bold text-amber-700 uppercase tracking-wider">WHEN</span>
          <div className="flex items-center bg-white border border-amber-200 rounded-md overflow-hidden text-xs">
            {['and','or'].map(m=>(
              <button key={m} type="button" onClick={()=>onChange({when:{...when,match:m},then})}
                className={cn('px-2.5 py-1 font-medium uppercase transition-colors',when.match===m?'bg-amber-500 text-white':'text-gray-500 hover:bg-amber-50')}>
                {m}
              </button>
            ))}
          </div>
          <span className="text-xs text-amber-600">of the following conditions are true</span>
        </div>
        <div className="p-4 flex flex-col gap-2.5">
          {when.conditions.length===0&&<p className="text-sm text-gray-400 text-center py-3">No conditions — rule will always fire</p>}
          {when.conditions.map((c,i)=><ConditionRow key={c.id} cond={c} index={i} onChange={nc=>updCond(i,nc)} onRemove={()=>delCond(i)}/>)}
          <button type="button" onClick={addCond} className="flex items-center gap-1.5 text-xs text-blue-600 hover:text-blue-700 font-medium mt-1">
            <IC.Plus size={13}/>Add Condition
          </button>
        </div>
      </div>

      {/* THEN */}
      <div className="border border-gray-200 rounded-lg overflow-hidden">
        <div className="bg-blue-50 border-b border-blue-100 px-4 py-2.5">
          <span className="text-xs font-bold text-blue-700 uppercase tracking-wider">THEN</span>
          <span className="ml-3 text-xs text-blue-600">execute the following actions</span>
        </div>
        <div className="p-4 flex flex-col gap-2.5">
          {then.length===0&&<p className="text-sm text-gray-400 text-center py-3">No actions defined</p>}
          {then.map((a,i)=><ActionRow key={a.id} action={a} onChange={na=>updAct(i,na)} onRemove={()=>delAct(i)}/>)}
          <button type="button" onClick={addAct} className="flex items-center gap-1.5 text-xs text-blue-600 hover:text-blue-700 font-medium mt-1">
            <IC.Plus size={13}/>Add Action
          </button>
        </div>
      </div>
    </div>
  );
};

/* ── SCHEMA BUILDER ──────────────────────────────── */
const SchemaBuilder=({schema,onChange,label})=>{
  const addFact=()=>onChange({...schema,facts:[...schema.facts,{factType:'',fields:[{name:'',dataType:'string',required:false}]}]});
  const updFact=(i,f)=>{const nf=[...schema.facts];nf[i]=f;onChange({...schema,facts:nf});};
  const delFact=(i)=>onChange({...schema,facts:schema.facts.filter((_,j)=>j!==i)});
  const addField=(fi)=>{const nf=[...schema.facts];nf[fi]={...nf[fi],fields:[...nf[fi].fields,{name:'',dataType:'string',required:false}]};onChange({...schema,facts:nf});};
  const updField=(fi,fli,fl)=>{const nf=[...schema.facts];const nfl=[...nf[fi].fields];nfl[fli]=fl;nf[fi]={...nf[fi],fields:nfl};onChange({...schema,facts:nf});};
  const delField=(fi,fli)=>{const nf=[...schema.facts];nf[fi]={...nf[fi],fields:nf[fi].fields.filter((_,j)=>j!==fli)};onChange({...schema,facts:nf});};
  return(
    <div>
      <div className="flex items-center justify-between mb-2">
        <span className="text-sm font-medium text-gray-700">{label}</span>
        <button type="button" onClick={addFact} className="text-xs text-blue-600 hover:text-blue-700 flex items-center gap-1"><IC.Plus size={12}/>Add fact type</button>
      </div>
      {schema.facts.map((fact,fi)=>(
        <div key={fi} className="border border-gray-200 rounded-lg mb-2 overflow-hidden">
          <div className="flex items-center gap-2 px-3 py-2 bg-gray-50 border-b border-gray-100">
            <Inp value={fact.factType} onChange={e=>updFact(fi,{...fact,factType:e.target.value})} placeholder="FactType name" className="flex-1"/>
            <button type="button" onClick={()=>delFact(fi)} className="text-gray-400 hover:text-red-500"><IC.Trash size={12}/></button>
          </div>
          <div className="p-3 flex flex-col gap-1.5">
            {fact.fields.map((fl,fli)=>(
              <div key={fli} className="flex items-center gap-2">
                <Inp value={fl.name} onChange={e=>updField(fi,fli,{...fl,name:e.target.value})} placeholder="field name" className="flex-1"/>
                <Sel value={fl.dataType} onChange={e=>updField(fi,fli,{...fl,dataType:e.target.value})}
                  options={['string','number','boolean','date','datetime','list','object'].map(v=>({value:v,label:v}))} className="w-28"/>
                <label className="flex items-center gap-1 text-xs text-gray-500 whitespace-nowrap">
                  <input type="checkbox" checked={fl.required} onChange={e=>updField(fi,fli,{...fl,required:e.target.checked})} className="w-3.5 h-3.5"/>req
                </label>
                <button type="button" onClick={()=>delField(fi,fli)} className="text-gray-300 hover:text-red-400"><IC.Trash size={11}/></button>
              </div>
            ))}
            <button type="button" onClick={()=>addField(fi)} className="text-xs text-blue-500 hover:text-blue-600 flex items-center gap-1 mt-1"><IC.Plus size={11}/>field</button>
          </div>
        </div>
      ))}
    </div>
  );
};

/* ── RULE CREATE PAGE ────────────────────────────── */
const emptyRule={when:{match:'and',conditions:[]},then:[]};
const emptyInput={facts:[{factType:'ApplicantInfo',fields:[{name:'',dataType:'string',required:false}]}],onDemand:[]};
const emptyOutput={facts:[{factType:'ApplicantInfo',fields:[{name:'',dataType:'string',required:false}]}],decisions:[],reasons:[]};

const RuleCreatePage=({onSave,onCancel,initialRule=null})=>{
  const isNewVersion=!!initialRule;
  const [step,setStep]=useState(0);
  const [form,setForm]=useState({
    name:initialRule?.name||'',
    category:initialRule?.category||'',
    tags:initialRule?.tags||[],
    description:'',
    effectiveFrom:'',
    effectiveUntil:'',
    changeSummary:isNewVersion?'':'Initial version',
    inputSchema:JSON.parse(JSON.stringify(emptyInput)),
    outputSchema:JSON.parse(JSON.stringify(emptyOutput)),
    rule:JSON.parse(JSON.stringify(emptyRule)),
  });
  const [tagInput,setTagInput]=useState('');
  const [errors,setErrors]=useState({});

  const addTag=(e)=>{if(e.key==='Enter'&&tagInput.trim()){e.preventDefault();setForm(f=>({...f,tags:[...f.tags,tagInput.trim()]}));setTagInput('');}};
  const removeTag=(t)=>setForm(f=>({...f,tags:f.tags.filter(x=>x!==t)}));

  const validate=()=>{
    const e={};
    if(!form.name.trim())e.name='Rule name is required';
    setErrors(e);return Object.keys(e).length===0;
  };

  const handleSave=()=>{if(validate())onSave(form);};

  const STEPS=[
    {label:'Document'},
    {label:'Version Info'},
    {label:'Input Schema'},
    {label:'Output Schema'},
    {label:'Rule Logic'},
  ];

  return(
    <div className="flex flex-col h-full">
      {/* breadcrumb */}
      <div className="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-3">
        <button onClick={onCancel} className="flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700"><IC.Back size={14}/>Decisions</button>
        <IC.ChevR size={14} className="text-gray-300"/>
        <span className="text-sm font-medium text-gray-900">{isNewVersion?`New Version — ${initialRule.name}`:'New Rule'}</span>
      </div>

      {/* stepper */}
      <div className="bg-white border-b border-gray-100 px-6 py-3">
        <div className="flex items-center gap-0">
          {STEPS.map((s,i)=>(
            <React.Fragment key={s.label}>
              <button type="button" onClick={()=>setStep(i)}
                className={cn('flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm transition-colors',
                  step===i?'bg-blue-50 text-blue-700 font-medium':i<step?'text-gray-600 hover:bg-gray-50':'text-gray-400 hover:bg-gray-50')}>
                <span className={cn('w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold shrink-0',
                  step===i?'bg-blue-600 text-white':i<step?'bg-green-500 text-white':'bg-gray-200 text-gray-500')}>
                  {i<step?<IC.Check size={10}/>:i+1}
                </span>
                {s.label}
              </button>
              {i<STEPS.length-1&&<div className="w-4 h-px bg-gray-200 mx-1"/>}
            </React.Fragment>
          ))}
        </div>
      </div>

      <div className="flex-1 overflow-y-auto scrollbar p-6">
        <div className="max-w-2xl mx-auto">
          {/* STEP 0: Document */}
          {step===0&&(
            <div className="bg-white rounded-xl border border-gray-200 p-6 flex flex-col gap-5">
              <div>
                <h2 className="text-base font-semibold text-gray-900 mb-0.5">Document Info</h2>
                <p className="text-sm text-gray-400">The rule name is immutable after creation and serves as the unique key within this space.</p>
              </div>
              <Field label="Rule Name" required hint={isNewVersion?"Name is locked — creating a new version of an existing rule":"Must be unique within this space. Cannot be changed after creation."}>
                <Inp value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Age Eligibility Check" disabled={isNewVersion}
                  className={cn(errors.name&&'border-red-400',isNewVersion&&'bg-gray-50')}/>
                {errors.name&&<p className="text-xs text-red-500 mt-1">{errors.name}</p>}
              </Field>
              <Field label="Category">
                <Sel value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}
                  options={[{value:'',label:'Select category…'},...CATEGORIES.map(c=>({value:c,label:c}))]}/>
              </Field>
              <Field label="Tags" hint="Press Enter to add">
                <div className="flex flex-wrap gap-1.5 p-2 border border-gray-200 rounded-md bg-white min-h-[36px]">
                  {form.tags.map(t=><Tag key={t} label={t} onRemove={()=>removeTag(t)}/>)}
                  <input value={tagInput} onChange={e=>setTagInput(e.target.value)} onKeyDown={addTag}
                    placeholder={form.tags.length?'':"Add tag…"}
                    className="ring-f flex-1 text-sm outline-none min-w-[80px] placeholder:text-gray-400"/>
                </div>
              </Field>
            </div>
          )}

          {/* STEP 1: Version Info */}
          {step===1&&(
            <div className="bg-white rounded-xl border border-gray-200 p-6 flex flex-col gap-5">
              <div>
                <h2 className="text-base font-semibold text-gray-900 mb-0.5">Version Metadata</h2>
                <p className="text-sm text-gray-400">Describes what this specific version does. Can be edited on DRAFT versions via PATCH.</p>
              </div>
              <Field label="Description" hint="What does this version of the rule do?">
                <textarea value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} rows={3}
                  placeholder="Rejects applicants under 18 or over 65…"
                  className="ring-f px-3 py-2 text-sm border border-gray-200 rounded-md bg-white resize-none focus:border-blue-400 placeholder:text-gray-400"/>
              </Field>
              <div className="grid grid-cols-2 gap-4">
                <Field label="Effective From">
                  <Inp type="date" value={form.effectiveFrom} onChange={e=>setForm(f=>({...f,effectiveFrom:e.target.value}))}/>
                </Field>
                <Field label="Effective Until" hint="Leave blank for open-ended">
                  <Inp type="date" value={form.effectiveUntil} onChange={e=>setForm(f=>({...f,effectiveUntil:e.target.value}))}/>
                </Field>
              </div>
              <Field label="Change Summary" hint={isNewVersion?"Describe what changed in this version":""}>
                <Inp value={form.changeSummary} onChange={e=>setForm(f=>({...f,changeSummary:e.target.value}))}
                  placeholder={isNewVersion?"e.g. Raised minimum age from 18 to 21":"Initial version"}/>
              </Field>
            </div>
          )}

          {/* STEP 2: Input Schema */}
          {step===2&&(
            <div className="bg-white rounded-xl border border-gray-200 p-6">
              <div className="mb-4">
                <h2 className="text-base font-semibold text-gray-900 mb-0.5">Input Schema</h2>
                <p className="text-sm text-gray-400">Declare the fact types and fields this rule reads. Drives authoring-time validation.</p>
              </div>
              <SchemaBuilder schema={form.inputSchema} onChange={s=>setForm(f=>({...f,inputSchema:s}))} label="Input fact types"/>
            </div>
          )}

          {/* STEP 3: Output Schema */}
          {step===3&&(
            <div className="bg-white rounded-xl border border-gray-200 p-6">
              <div className="mb-4">
                <h2 className="text-base font-semibold text-gray-900 mb-0.5">Output Schema</h2>
                <p className="text-sm text-gray-400">Declare what fact fields and top-level decisions this rule produces.</p>
              </div>
              <SchemaBuilder schema={form.outputSchema} onChange={s=>setForm(f=>({...f,outputSchema:s}))} label="Output fact types"/>
              {/* decisions */}
              <div className="mt-4">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-sm font-medium text-gray-700">Top-level Decisions</span>
                  <button type="button" onClick={()=>setForm(f=>({...f,outputSchema:{...f.outputSchema,decisions:[...f.outputSchema.decisions,{name:'',dataType:'string'}]}}))}
                    className="text-xs text-blue-600 hover:text-blue-700 flex items-center gap-1"><IC.Plus size={12}/>Add decision</button>
                </div>
                {form.outputSchema.decisions.map((d,i)=>(
                  <div key={i} className="flex items-center gap-2 mb-1.5">
                    <Inp value={d.name} onChange={e=>{const nd=[...form.outputSchema.decisions];nd[i]={...d,name:e.target.value};setForm(f=>({...f,outputSchema:{...f.outputSchema,decisions:nd}}));}} placeholder="decision name" className="flex-1"/>
                    <Sel value={d.dataType} onChange={e=>{const nd=[...form.outputSchema.decisions];nd[i]={...d,dataType:e.target.value};setForm(f=>({...f,outputSchema:{...f.outputSchema,decisions:nd}}));}}
                      options={['string','number','boolean'].map(v=>({value:v,label:v}))} className="w-28"/>
                    <button type="button" onClick={()=>setForm(f=>({...f,outputSchema:{...f.outputSchema,decisions:f.outputSchema.decisions.filter((_,j)=>j!==i)}}))} className="text-gray-300 hover:text-red-400"><IC.Trash size={12}/></button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* STEP 4: Rule Logic */}
          {step===4&&(
            <div className="bg-white rounded-xl border border-gray-200 p-6">
              <div className="mb-5">
                <h2 className="text-base font-semibold text-gray-900 mb-0.5">Rule Logic</h2>
                <p className="text-sm text-gray-400">Define the conditions (WHEN) and actions (THEN) for this rule.</p>
              </div>
              <RuleBuilder when={form.rule.when} then={form.rule.then} onChange={r=>setForm(f=>({...f,rule:r}))}/>
            </div>
          )}
        </div>
      </div>

      {/* footer */}
      <div className="bg-white border-t border-gray-200 px-6 py-3 flex items-center justify-between shrink-0">
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
        <div className="flex gap-2">
          {step>0&&<Btn variant="outline" onClick={()=>setStep(s=>s-1)}>← Back</Btn>}
          {step<STEPS.length-1
            ?<Btn onClick={()=>setStep(s=>s+1)}>Next →</Btn>
            :<Btn onClick={handleSave}>{isNewVersion?'Create New Version':'Save as Draft'}</Btn>}
        </div>
      </div>
    </div>
  );
};

/* ── RULE DETAIL PAGE ────────────────────────────── */
const RuleDetailPage=({rule,onBack,onUpdate,onNewVersion,onEditMeta})=>{
  const [selVer,setSelVer]=useState(()=>activeVer(rule)||rule.versions[0]);
  const [confirmDel,setConfirmDel]=useState(null);
  const currentRule=rule; // may be updated via onUpdate

  const getVer=(v)=>rule.versions.find(x=>x.version===v)||null;

  const handleActivate=(ver)=>{
    onUpdate({...rule,versions:rule.versions.map(v=>v.version===ver.version?{...v,status:'ACTIVE',activatedAt:new Date().toISOString(),activatedBy:'alice@insure.com'}:v)});
    setSelVer({...ver,status:'ACTIVE'});
  };
  const handleDeactivate=(ver)=>{
    onUpdate({...rule,versions:rule.versions.map(v=>v.version===ver.version?{...v,status:'INACTIVE'}:v)});
    setSelVer({...ver,status:'INACTIVE'});
  };
  const handleDeleteVer=(ver)=>{
    onUpdate({...rule,versions:rule.versions.filter(v=>v.version!==ver.version)});
    setSelVer(rule.versions[0]||null);
    setConfirmDel(null);
  };

  const ver=selVer;

  return(
    <div className="flex flex-col h-full">
      {/* header */}
      <div className="bg-white border-b border-gray-200 px-6 py-4">
        <button onClick={onBack} className="flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 mb-3"><IC.Back size={14}/>Decisions</button>
        <div className="flex items-start justify-between gap-4">
          <div>
            <div className="flex items-center gap-2 flex-wrap">
              <h1 className="text-lg font-semibold text-gray-900">{rule.name}</h1>
              <span className="px-2 py-0.5 bg-gray-100 text-gray-500 text-xs rounded font-mono">immutable</span>
              <span className="text-xs text-gray-400">{rule.category}</span>
            </div>
            <div className="flex gap-1.5 mt-1.5 flex-wrap">
              {rule.tags.map(t=><Tag key={t} label={t}/>)}

            <Btn size="sm" onClick={()=>onNewVersion(rule)}><IC.Plus size={13}/>New Version</Btn>
          </div>
        </div>
      </div>

      <div className="flex flex-1 overflow-hidden">
        {/* LEFT: versions panel */}

          <div className="px-4 py-3 border-b border-gray-100">
            <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider">Versions ({rule.versions.length})</p>
          </div>
          <div className="overflow-y-auto scrollbar flex-1 py-2">
            {[...rule.versions].sort((a,b)=>b.version-a.version).map(v=>(
              <button key={v.version} onClick={()=>setSelVer(v)}
                className={cn('w-full text-left px-4 py-3 flex items-start gap-3 transition-colors border-l-2',
                  selVer?.version===v.version?'bg-blue-50 border-blue-500':'border-transparent hover:bg-gray-50')}>
                <div className={cn('w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold shrink-0 mt-0.5',
                  selVer?.version===v.version?'bg-blue-600 text-white':'bg-gray-100 text-gray-600')}>
                  v{v.version}
                </div>
                <div className="flex-1 min-w-0">
                  <StatusBadge status={v.status}/>
                  <p className="text-xs text-gray-400 mt-1 truncate">{v.changeSummary||'No summary'}</p>
                  {v.effectiveFrom&&<p className="text-xs text-gray-300 mt-0.5">From {fmt(v.effectiveFrom)}</p>}
                </div>
              </button>
            ))}
          </div>
          {/* doc info */}
          <div className="border-t border-gray-100 p-4 text-xs text-gray-400 space-y-1">
            <p className="font-medium text-gray-500 mb-2">Document</p>
            <p>ID: <span className="font-mono">{rule.id}</span></p>

                <div className="flex items-start justify-between gap-4 mb-4">

                    {ver.status==='ACTIVE'&&<Btn size="sm" variant="outline" onClick={()=>handleDeactivate(ver)}>Deactivate</Btn>}
                    {['DRAFT','INACTIVE','DEPRECATED'].includes(ver.status)&&(
                      <Btn size="sm" variant="ghost" onClick={()=>setConfirmDel(ver)} className="hover:bg-red-50 hover:text-red-500"><IC.Trash size={13}/></Btn>

                </div>
                <div className="grid grid-cols-2 gap-x-6 gap-y-2 text-sm">
                  {[['Change Summary',ver.changeSummary||'—'],['Effective From',fmt(ver.effectiveFrom)],['Effective Until',ver.effectiveUntil?fmt(ver.effectiveUntil):'Open-ended'],
                    ver.activatedAt&&['Activated',fmt(ver.activatedAt)],ver.activatedAt&&['Activated By',ver.activatedBy]].filter(Boolean).map(([k,v2])=>(

                        {f.fields.map(fl=>(
                          <div key={fl.name} className="flex items-center gap-2 text-xs mb-1">
                            <span className="font-mono text-blue-600">{fl.name}</span>
                            <span className="text-gray-300">:</span>
                            <span className="text-gray-500">{fl.dataType}</span>
                            {fl.required&&<span className="text-red-400 text-[10px]">required</span>}
                          </div>
                        ))}
                      </div>
                    ))}
                    {schema?.decisions?.length>0&&(
                      <div className="mt-2 pt-2 border-t border-gray-100">
                        <p className="text-[10px] text-gray-400 mb-1">DECISIONS</p>
                        {schema.decisions.map(d=>(
                          <div key={d.name} className="flex items-center gap-2 text-xs">
                            <span className="font-mono text-purple-600">{d.name}</span>
                            <span className="text-gray-400">{d.dataType}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>

              {/* rule logic */}
              <div className="bg-white rounded-xl border border-gray-200 p-5">
                <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-4">Rule Logic</p>
                {/* WHEN */}
                <div className="mb-4">
                  <div className="flex items-center gap-2 mb-2">
                    <span className="px-2 py-0.5 bg-amber-100 text-amber-700 text-xs font-bold rounded">WHEN</span>
                    <span className="px-2 py-0.5 bg-gray-100 text-gray-600 text-xs font-bold rounded uppercase">{ver.rule?.when?.match||'and'}</span>
                  </div>
                  {ver.rule?.when?.conditions?.length===0&&<p className="text-xs text-gray-400 italic">No conditions — always fires</p>}
                  {ver.rule?.when?.conditions?.map((c,i)=>(
                    <div key={c.id||i} className="flex items-center gap-2 text-xs mb-1.5 pl-4">
                      {i>0&&<span className="text-gray-400 w-6">{ver.rule.when.match.toUpperCase()}</span>}
                      <span className="font-mono text-blue-700 bg-blue-50 px-1.5 py-0.5 rounded">{c.field}</span>
                      <span className="text-gray-500">{OPERATORS.find(o=>o.value===c.operator)?.label||c.operator}</span>
                      <span className="font-mono text-green-700 bg-green-50 px-1.5 py-0.5 rounded">{c.value}{c.secondValue&&` … ${c.secondValue}`}</span>
                    </div>
                  ))}
                </div>
                {/* THEN */}
                <div>
                  <span className="px-2 py-0.5 bg-blue-100 text-blue-700 text-xs font-bold rounded mb-2 inline-block">THEN</span>
                  {ver.rule?.then?.map((a,i)=>(
                    <div key={a.id||i} className="flex items-center gap-2 text-xs mb-1.5 pl-4 flex-wrap">
                      <span className="px-1.5 py-0.5 bg-indigo-50 text-indigo-700 rounded font-mono font-medium">{a.type}</span>
                      {a.field&&<><span className="text-gray-400">→</span><span className="font-mono text-blue-700 bg-blue-50 px-1.5 py-0.5 rounded">{a.field}</span></>}
                      {a.value!==undefined&&a.value!==''&&<><span className="text-gray-400">=</span><span className="font-mono text-green-700 bg-green-50 px-1.5 py-0.5 rounded">{String(a.value)}</span></>}
                      {a.config?.template&&<span className="text-gray-600 italic">"{a.config.template}"</span>}
                      {a.config?.formula&&<span className="font-mono text-purple-600">{a.config.formula}</span>}
                      {a.config?.percentage!=null&&<span className="text-gray-500">{a.config.percentage}%</span>}
                    </div>
                  ))}
                </div>
              </div>

              {/* API hint */}
              <div className="bg-gray-50 rounded-lg p-4 text-xs text-gray-500 border border-gray-100">
                <p className="font-semibold text-gray-600 mb-1">API Reference</p>
                <p className="font-mono text-gray-400">GET /api/v1/spaces/motor-uw/rules/{rule.id}/versions/{ver.version}</p>
                {ver.status==='DRAFT'&&<p className="font-mono text-gray-400 mt-0.5">PATCH /api/v1/spaces/motor-uw/rules/{rule.id}/versions/{ver.version} <span className="text-amber-600">(metadata only)</span></p>}
                <p className="font-mono text-gray-400 mt-0.5">POST /api/v1/spaces/motor-uw/rules/{rule.id}/versions/{ver.version}/activate</p>
              </div>
            </div>
          </div>
        ):(
          <div className="flex-1 flex items-center justify-center text-sm text-gray-400">Select a version to view details</div>
        )}
      </div>

      {/* delete version confirm */}
      <Modal open={!!confirmDel} onClose={()=>setConfirmDel(null)} title="Delete Version" width="max-w-sm">
        <div className="p-5 flex flex-col gap-4">
          <div className="p-3.5 bg-red-50 rounded-lg border border-red-100 text-sm text-red-700">
            Version {confirmDel?.version} will be soft-deleted and retained for audit compliance. You can restore it later.
          </div>
          <div className="flex gap-2 justify-end">
            <Btn variant="outline" onClick={()=>setConfirmDel(null)}>Cancel</Btn>
            <Btn variant="destructive" onClick={()=>handleDeleteVer(confirmDel)}>Delete Version</Btn>
          </div>
        </div>
      </Modal>
    </div>
  );
};

/* ── EDIT METADATA MODAL ─────────────────────────── */
const EditMetaModal=({rule,open,onClose,onSave})=>{
  const [tags,setTags]=useState(rule?.tags||[]);
  const [category,setCategory]=useState(rule?.category||'');
  const [tagInput,setTagInput]=useState('');
  useEffect(()=>{if(open){setTags(rule.tags);setCategory(rule.category);}},[open,rule]);
  const addTag=(e)=>{if(e.key==='Enter'&&tagInput.trim()){e.preventDefault();setTags(t=>[...t,tagInput.trim()]);setTagInput('');}};
  return(
    <Modal open={open} onClose={onClose} title="Edit Document Metadata"
      subtitle="Only tags and category can be changed. Rule name is immutable.">
      <div className="p-5 flex flex-col gap-4">
        <div className="px-3 py-2 bg-amber-50 border border-amber-100 rounded-lg text-xs text-amber-700">
          <strong>Note:</strong> To change rule logic, create a new version. To update version-level metadata on a DRAFT, use the version PATCH endpoint.
        </div>
        <Field label="Category">
          <Sel value={category} onChange={e=>setCategory(e.target.value)}
            options={[{value:'',label:'Select…'},...CATEGORIES.map(c=>({value:c,label:c}))]}/>
        </Field>
        <Field label="Tags" hint="Press Enter to add">
          <div className="flex flex-wrap gap-1.5 p-2 border border-gray-200 rounded-md bg-white min-h-[36px]">
            {tags.map(t=><Tag key={t} label={t} onRemove={()=>setTags(ts=>ts.filter(x=>x!==t))}/>)}
            <input value={tagInput} onChange={e=>setTagInput(e.target.value)} onKeyDown={addTag}
              placeholder="Add tag…" className="ring-f flex-1 text-sm outline-none min-w-[80px] placeholder:text-gray-400"/>
          </div>
        </Field>
        <div className="flex gap-2 justify-end">
          <Btn variant="outline" onClick={onClose}>Cancel</Btn>
          <Btn onClick={()=>onSave({tags,category})}>Save Changes</Btn>
        </div>
      </div>
    </Modal>
  );
};

/* ── DELETE RULE CONFIRM ─────────────────────────── */
const DeleteRuleModal=({rule,open,onClose,onConfirm})=>(
  <Modal open={open} onClose={onClose} title="Delete Rule" width="max-w-sm">
    <div className="p-5 flex flex-col gap-4">
      <div className="p-3.5 bg-red-50 rounded-lg border border-red-100 text-sm text-red-700">
        Soft-deleting <strong>{rule?.name}</strong> will make it inaccessible. All {rule?.versions?.length||0} version(s) are retained for audit compliance (7 years). Use <code>?hard=true</code> for permanent deletion.
      </div>
      <div className="flex gap-2 justify-end">
        <Btn variant="outline" onClick={onClose}>Cancel</Btn>
        <Btn variant="destructive" onClick={onConfirm}>Delete Rule</Btn>
      </div>
    </div>
  </Modal>
);

/* ── TABLE DETAIL (simple) ───────────────────────── */
const TableDetailPage=({tbl,onBack})=>{
  const ver=activeVer(tbl)||tbl.versions[0];
  return(
    <div className="flex flex-col h-full">
      <div className="bg-white border-b border-gray-200 px-6 py-4">
        <button onClick={onBack} className="flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 mb-3"><IC.Back size={14}/>Decisions</button>
        <h1 className="text-lg font-semibold text-gray-900">{tbl.name}</h1>
        <div className="flex gap-1.5 mt-1">{tbl.tags.map(t=><Tag key={t} label={t}/>)}</div>
      </div>
      <div className="flex-1 overflow-auto scrollbar p-6">
        <div className="max-w-3xl">
          <div className="bg-white rounded-xl border border-gray-200 p-5 mb-4">
            <div className="flex items-center gap-3 mb-4">
              <StatusBadge status={ver?.status}/>
              <span className="text-sm text-gray-500">v{ver?.version} · Hit policy: <strong>{ver?.table?.hitPolicy?.replace('_',' ')}</strong></span>
            </div>
            <p className="text-sm text-gray-600 mb-1">{ver?.description}</p>
          </div>
          {ver?.table&&(
            <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
              <table className="w-full text-sm">
                <thead><tr className="bg-gray-50 border-b border-gray-200">
                  <th className="px-3 py-2 text-xs font-semibold text-gray-500 text-left">Row</th>
                  {ver.table.inputs.map((inp,i)=><th key={i} className="px-3 py-2 text-xs font-semibold text-amber-600 text-left">{inp.label||inp.field} <span className="text-gray-300">({inp.operator})</span></th>)}
                  {ver.table.outputs.map((out,i)=><th key={i} className="px-3 py-2 text-xs font-semibold text-blue-600 text-left">{out.label||out.field}</th>)}
                  <th className="px-3 py-2 text-xs font-semibold text-gray-400 text-left">Enabled</th>
                </tr></thead>
                <tbody className="divide-y divide-gray-50">
                  {ver.table.rows.map(row=>(
                    <tr key={row.id} className={cn('transition-colors',row.isEnabled?'hover:bg-gray-50':'bg-gray-50 opacity-50')}>
                      <td className="px-3 py-2 text-xs text-gray-400">{row.id}</td>
                      {row.inputs.map((inp,i)=><td key={i} className="px-3 py-2 font-mono text-xs text-gray-700">{inp}</td>)}
                      {row.outputs.map((out,i)=><td key={i} className="px-3 py-2 font-mono text-xs text-blue-700 font-medium">{out}</td>)}
                      <td className="px-3 py-2"><span className={cn('text-xs font-medium',row.isEnabled?'text-green-600':'text-gray-400')}>{row.isEnabled?'Yes':'No'}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

/* ── FLOW DETAIL (simple) ────────────────────────── */
const FlowDetailPage=({flow,onBack})=>{
  const ver=activeVer(flow)||flow.versions[0];
  const nodeColors={start:'bg-green-100 text-green-700 border-green-200',end:'bg-red-100 text-red-700 border-red-200',rule:'bg-blue-50 text-blue-700 border-blue-200',table:'bg-purple-50 text-purple-700 border-purple-200',expression:'bg-amber-50 text-amber-700 border-amber-200'};
  return(
    <div className="flex flex-col h-full">
      <div className="bg-white border-b border-gray-200 px-6 py-4">
        <button onClick={onBack} className="flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 mb-3"><IC.Back size={14}/>Decisions</button>
        <h1 className="text-lg font-semibold text-gray-900">{flow.name}</h1>
        <div className="flex gap-1.5 mt-1">{flow.tags.map(t=><Tag key={t} label={t}/>)}</div>
      </div>
      <div className="flex-1 overflow-auto scrollbar p-6">
        <div className="max-w-2xl">
          <div className="bg-white rounded-xl border border-gray-200 p-5 mb-4">
            <div className="flex items-center gap-3 mb-2"><StatusBadge status={ver?.status}/>
              <span className="text-sm text-gray-500">v{ver?.version} · Merge: <strong>{ver?.flow?.mergeStrategy?.replace(/_/g,' ')}</strong></span>
            </div>
          </div>
          {ver?.flow&&(
            <div className="bg-white rounded-xl border border-gray-200 p-5">
              <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Pipeline Nodes</p>
              <div className="flex flex-col gap-2">
                {ver.flow.nodes.map((node,i)=>(
                  <div key={node.id} className="flex items-center gap-3">
                    <div className={cn('flex items-center gap-2.5 px-3 py-2 rounded-lg border text-sm font-medium flex-1',nodeColors[node.type]||'bg-gray-50 text-gray-700 border-gray-200')}>
                      <span className="text-xs opacity-60 font-mono">{node.type}</span>
                      <span>{node.name}</span>
                      {node.config?.ruleRef&&<span className="text-xs opacity-50 ml-auto font-mono">{node.config.ruleRef}</span>}
                      {node.config?.tableRef&&<span className="text-xs opacity-50 ml-auto font-mono">{node.config.tableRef}</span>}
                    </div>
                    {i<ver.flow.nodes.length-1&&<IC.Flow size={14} className="text-gray-300 shrink-0"/>}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

/* ── ROOT APP ────────────────────────────────────── */
const App=()=>{
  const [primaryNav,setPrimaryNav]=useState('rules');
  const [secondaryNav,setSecondaryNav]=useState('decisions');
  const [rules,setRules]=useState(SEED_RULES);
  const [tables]=useState(SEED_TABLES);
  const [flows]=useState(SEED_FLOWS);
  const [page,setPage]=useState('decisions'); // decisions | rule-detail | rule-create | rule-new-version | table-detail | flow-detail
  const [selectedRule,setSelectedRule]=useState(null);
  const [selectedTable,setSelectedTable]=useState(null);
  const [selectedFlow,setSelectedFlow]=useState(null);
  const [editMetaOpen,setEditMetaOpen]=useState(false);
  const [deleteRule,setDeleteRule]=useState(null);
  const [toast,setToast]=useState(null);

  const showToast=(msg)=>setToast(msg);

  const handleViewRule=(rule)=>{setSelectedRule(rule);setPage('rule-detail');};
  const handleCreateRule=()=>setPage('rule-create');
  const handleEditRule=(rule)=>{setSelectedRule(rule);setPage('rule-detail');};
  const handleDeleteRule=(rule)=>setDeleteRule(rule);
  const handleViewTable=(tbl)=>{setSelectedTable(tbl);setPage('table-detail');};
  const handleViewFlow=(flow)=>{setSelectedFlow(flow);setPage('flow-detail');};

  const handleSaveRule=(form)=>{
    const newRule={
      id:'r'+uid(),name:form.name,category:form.category,tags:form.tags,
      createdAt:new Date().toISOString(),createdBy:'alice@insure.com',
      versions:[{id:uid(),version:1,status:'DRAFT',description:form.description,changeSummary:form.changeSummary,
        effectiveFrom:form.effectiveFrom,effectiveUntil:form.effectiveUntil,activatedAt:null,activatedBy:null,
        inputSchema:form.inputSchema,outputSchema:form.outputSchema,rule:form.rule}],
    };
    setRules(rs=>[...rs,newRule]);
    setPage('decisions');
    showToast(`Rule "${form.name}" created as Draft`);
  };

  const handleSaveNewVersion=(existingRule,form)=>{
    const nextVer=Math.max(...existingRule.versions.map(v=>v.version))+1;
    const newVer={id:uid(),version:nextVer,status:'DRAFT',description:form.description,changeSummary:form.changeSummary,
      effectiveFrom:form.effectiveFrom,effectiveUntil:form.effectiveUntil,activatedAt:null,activatedBy:null,
      inputSchema:form.inputSchema,outputSchema:form.outputSchema,rule:form.rule};
    const updated={...existingRule,versions:[...existingRule.versions,newVer]};
    setRules(rs=>rs.map(r=>r.id===existingRule.id?updated:r));
    setSelectedRule(updated);
    setPage('rule-detail');
    showToast(`Version ${nextVer} created as Draft`);
  };

  const handleUpdateRule=(updatedRule)=>{
    setRules(rs=>rs.map(r=>r.id===updatedRule.id?updatedRule:r));
    setSelectedRule(updatedRule);
  };

  const handleEditMeta=({tags,category})=>{
    const updated={...selectedRule,tags,category};
    setRules(rs=>rs.map(r=>r.id===selectedRule.id?updated:r));
    setSelectedRule(updated);
    setEditMetaOpen(false);
    showToast('Metadata updated');
  };

  const handleConfirmDelete=()=>{
    setRules(rs=>rs.filter(r=>r.id!==deleteRule.id));
    if(selectedRule?.id===deleteRule.id){setPage('decisions');setSelectedRule(null);}
    showToast(`Rule "${deleteRule.name}" deleted`);
    setDeleteRule(null);
  };

  const handleBack=()=>{setPage('decisions');setSelectedRule(null);setSelectedTable(null);setSelectedFlow(null);};

  const handleSecNav=(key)=>{
    setSecondaryNav(key);
    if(key==='decisions'){setPage('decisions');setSelectedRule(null);}
  };

  return(
    <div className="h-screen flex overflow-hidden bg-gray-50">
      <PrimarySidebar active={primaryNav} onSelect={setPrimaryNav}/>
      <SecondarySidebar active={secondaryNav} onSelect={handleSecNav} space="AXA Motor Insurance"/>
      <main className="flex-1 overflow-hidden flex flex-col">
        {page==='decisions'&&(
          <DecisionsPage rules={rules} tables={tables} flows={flows}
            onViewRule={handleViewRule} onCreateRule={handleCreateRule}
            onEditRule={handleEditRule} onDeleteRule={handleDeleteRule}
            onViewTable={handleViewTable} onViewFlow={handleViewFlow}/>
        )}
        {page==='rule-detail'&&selectedRule&&(
          <RuleDetailPage rule={selectedRule} onBack={handleBack}
            onUpdate={handleUpdateRule}
            onNewVersion={(r)=>{setSelectedRule(r);setPage('rule-new-version');}}
            onEditMeta={()=>setEditMetaOpen(true)}/>
        )}
        {page==='rule-create'&&(
          <RuleCreatePage onSave={handleSaveRule} onCancel={handleBack}/>
        )}
        {page==='rule-new-version'&&selectedRule&&(
          <RuleCreatePage initialRule={selectedRule}
            onSave={(form)=>handleSaveNewVersion(selectedRule,form)}
            onCancel={()=>setPage('rule-detail')}/>
        )}
        {page==='table-detail'&&selectedTable&&(
          <TableDetailPage tbl={selectedTable} onBack={handleBack}/>
        )}
        {page==='flow-detail'&&selectedFlow&&(
          <FlowDetailPage flow={selectedFlow} onBack={handleBack}/>
        )}
      </main>

      {/* modals */}
      {selectedRule&&<EditMetaModal rule={selectedRule} open={editMetaOpen} onClose={()=>setEditMetaOpen(false)} onSave={handleEditMeta}/>}
      <DeleteRuleModal rule={deleteRule} open={!!deleteRule} onClose={()=>setDeleteRule(null)} onConfirm={handleConfirmDelete}/>
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
